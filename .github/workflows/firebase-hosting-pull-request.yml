name: Deploy to Firebase Hosting on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMART_EFIS_GLOBAL }}
          projectId: smart-efis-global
          channelId: preview-${{ github.event.pull_request.number }}
          
      - name: Cleanup expired preview channels
        if: always()
        run: |
          npm install -g firebase-tools
          firebase hosting:channel:clean --project smart-efis-global \
            --keep 5 --expires 7d --only preview-*
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
