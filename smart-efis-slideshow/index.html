<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart EFIS – Slideshow</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; }
    .slideshow {
      width: 100%;
      height: 250px;
      background-size: cover;
      background-position: center;
      transition: background-image 1s ease-in-out;
      border-bottom: 4px solid #004b75;
    }
    h1 { text-align: center; padding: 1rem; }
  </style>
</head>
<body>

<div id="slideshow" class="slideshow"></div>
<h1>Welcome to Smart EFIS</h1>

<script>
  const images = [
    "https://images.unsplash.com/photo-1504198453319-5ce911bafcde",
    "https://images.unsplash.com/photo-1533488765986-dfa2a9939acd",
    "https://images.unsplash.com/photo-1508615093664-0d04a803c9f5",
    "https://images.unsplash.com/photo-1526498460520-4c246339dccb"
  ];
  let currentIndex = 0;
  const slideshow = document.getElementById("slideshow");

  function changeBackground() {
    slideshow.style.backgroundImage = `url('${images[currentIndex]}')`;
    currentIndex = (currentIndex + 1) % images.length;
  }
  changeBackground();
  setInterval(changeBackground, 5000);
</script>

</body>
</html>
